name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout notes
        uses: actions/checkout@v4
        with:
          path: notes

      - name: Checkout Quartz
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: v4
          path: quartz

      - name: Copy notes into Quartz content
        run: |
          mkdir -p quartz/content
          rsync -a --exclude='.git' --exclude='.github' --exclude='README.md' --exclude='.gitkeep' notes/ quartz/content/
          cp notes/README.md quartz/content/index.md

      - name: Configure site title and base URL
        run: |
          sed -i 's|quartz\.jzhao\.xyz|nini4746.github.io/cs|g' quartz/quartz.config.ts
          sed -i 's|pageTitle: .*|pageTitle: "CS 공부 노트",|' quartz/quartz.config.ts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build site
        working-directory: quartz
        run: |
          npm ci
          npx quartz build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
