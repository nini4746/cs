name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout notes
        uses: actions/checkout@v4
        with:
          path: notes
          fetch-depth: 0

      - name: Checkout Quartz
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: v4
          path: quartz

      - name: Copy notes into Quartz content
        run: |
          mkdir -p quartz/content
          rsync -a --exclude='.git' --exclude='.github' --exclude='README.md' --exclude='.gitkeep' --exclude='quartz.layout.ts' --exclude='quartz.custom.scss' notes/ quartz/content/
          printf -- '---\ntitle: "CS 공부 노트"\n---\n\n' > quartz/content/index.md
          cat notes/README.md >> quartz/content/index.md
          cp notes/quartz.layout.ts quartz/quartz.layout.ts
          cp notes/quartz.custom.scss quartz/quartz/styles/custom.scss

      - name: Inject creation dates from git history
        working-directory: notes
        run: |
          git ls-files '*.md' | while read -r f; do
            [ "$f" = "README.md" ] && continue
            target="../quartz/content/$f"
            [ -f "$target" ] || continue
            created=$(git log --follow --diff-filter=A --format=%aI -- "$f" | tail -1)
            modified=$(git log -1 --format=%aI -- "$f")
            [ -n "$created" ] || continue
            if head -1 "$target" | grep -q '^---$'; then
              grep -q '^created:' "$target" || {
                sed -i "1a modified: $modified" "$target"
                sed -i "1a created: $created" "$target"
              }
            else
              printf -- '---\ncreated: %s\nmodified: %s\n---\n\n' "$created" "$modified" | cat - "$target" > "$target.tmp"
              mv "$target.tmp" "$target"
            fi
          done

      - name: Configure site title, base URL, and date handling
        run: |
          sed -i 's|quartz\.jzhao\.xyz|nini4746.github.io/cs|g' quartz/quartz.config.ts
          sed -i 's|pageTitle: .*|pageTitle: "CS 공부 노트",|' quartz/quartz.config.ts
          sed -i 's|defaultDateType: "modified"|defaultDateType: "created"|' quartz/quartz.config.ts
          sed -i 's|priority: \["frontmatter", "git", "filesystem"\]|priority: ["frontmatter", "filesystem"]|' quartz/quartz.config.ts
          sed -i 's|Plugin.FolderPage(),|Plugin.FolderPage({ sort: (a, b) => (a.dates?.created.getTime() ?? 0) - (b.dates?.created.getTime() ?? 0) }),|' quartz/quartz.config.ts

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate progress dashboard
        run: node notes/scripts/gen-dashboard.mjs notes quartz/content/study-guide/dashboard.md quartz/content

      - name: Build site
        working-directory: quartz
        run: |
          npm ci
          npx quartz build

      - name: Generate Anki deck
        continue-on-error: true
        run: |
          python3 -m venv /tmp/ankivenv
          /tmp/ankivenv/bin/pip install --quiet genanki
          /tmp/ankivenv/bin/python notes/scripts/gen-anki.py notes quartz/public/cs-notes.apkg

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
